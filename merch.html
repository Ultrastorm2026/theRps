<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch - Renpalagoak</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Renpalagoak</div>
        <ul class="menu">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="#">Conocenos</a></li>
            <li><a href="#">Eventos</a></li>
            <li><a href="#">Galería</a></li>
            <li><a href="merch.html" class="btn">Merch</a></li>
        </ul>
    </nav>

    <section class="merch-header">
        <h1>Oficial Merch</h1>
        <p>Lleva el estilo de Renpalagoak contigo</p>
    </section>

    <section class="merch-container">
        
        <div class="product-card">
            <div class="product-img">
                <img src="Fotos/camiseta.jpg" alt="Camiseta Oficial">
            </div>
            <div class="product-info">
                <h3>Camiseta Logo</h3>
                <p class="price">20,00€</p>
                <button class="btn-buy">Comprar ahora</button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-img">
                <img src="Fotos/sudadera.jpg" alt="Sudadera Renpalagoak">
            </div>
            <div class="product-info">
                <h3>Sudadera Tour</h3>
                <p class="price">35,00€</p>
                <button class="btn-buy">Comprar ahora</button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-img">
                <img src="Fotos/gorra.jpg" alt="Gorra">
            </div>
            <div class="product-info">
                <h3>Gorra RP's</h3>
                <p class="price">15,00€</p>
                <button class="btn-buy">Comprar ahora</button>
            </div>
        </div>

    </section>

    <footer class="redes-sociales">
        <p>Síguenos en nuestras redes</p>
        <div class="contenedor-iconos">
            <a href="#" class="red-link"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="#" class="red-link"><i class="fab fa-tiktok"></i> TikTok</a>
            <a href="#" class="red-link"><i class="fab fa-youtube"></i> YouTube</a>
        </div>
    </footer>

</body>
</html>
